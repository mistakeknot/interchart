function renderSequenceView() {
  var depth = WORKFLOW_DEPTH;
  var allEntities = getAllWorkflowEntities(depth);
  var phases = SPRINT_PHASES.filter(function(p) { return activePhases.has(p.id); });
  if (phases.length === 0) return;

  // Layout constants — size to content, not viewport
  var margin = { top: 80, left: 180, right: 40, bottom: 40 };
  var minColWidth = 130;
  var colWidth = Math.max(minColWidth, (width - margin.left - margin.right) / phases.length);
  var rowHeight = 22;

  // Build row list: grouped by type
  var rows = [];
  var typeOrder = ['plugins', 'skills', 'agents', 'mcp', 'hooks'];
  var typeLabels = { plugins: 'Plugins', skills: 'Skills', agents: 'Agents', mcp: 'MCP', hooks: 'Hooks' };
  var typeColors = { plugins: '#4A90D9', skills: '#50C878', agents: '#FF8C42', mcp: '#9B59B6', hooks: '#E74C3C' };

  typeOrder.forEach(function(type) {
    if (allEntities[type].length === 0) return;
    rows.push({ type: 'group-label', label: typeLabels[type], entityType: type });
    allEntities[type].forEach(function(id) {
      var label = id;
      var n = nodeById[id];
      if (n) label = n.label;
      rows.push({ type: 'entity', id: id, label: label, entityType: type });
    });
  });

  var totalWidth = margin.left + phases.length * colWidth + margin.right;
  var totalHeight = margin.top + rows.length * rowHeight + margin.bottom;

  // Create a fresh SVG sized to content inside the scroll container
  var seqSvg = d3.select(workflowContainer).append('svg')
    .attr('width', totalWidth).attr('height', totalHeight);

  // Arrow marker for this SVG
  var seqDefs = seqSvg.append('defs');
  seqDefs.append('marker')
    .attr('id', 'seq-artifact-arrow')
    .attr('viewBox', '0 0 10 6')
    .attr('refX', 10).attr('refY', 3)
    .attr('markerWidth', 8).attr('markerHeight', 5)
    .attr('orient', 'auto')
    .append('path').attr('d', 'M0,0 L10,3 L0,6 Z').attr('fill', '#F39C12');

  var sg = seqSvg.append('g');

  // Background
  sg.append('rect')
    .attr('width', totalWidth).attr('height', totalHeight)
    .attr('fill', '#0d1117');

  // Column headers
  phases.forEach(function(phase, ci) {
    var cx = margin.left + ci * colWidth + colWidth / 2;
    var color = PHASE_COLORS[phase.phase] || '#8b949e';
    var headerG = sg.append('g').attr('class', 'sequence-header');

    headerG.append('rect')
      .attr('x', cx - colWidth / 2 + 4).attr('y', 10)
      .attr('width', colWidth - 8).attr('height', 50)
      .attr('fill', color + '18').attr('stroke', color).attr('stroke-width', 1);

    headerG.append('rect')
      .attr('x', cx - colWidth / 2 + 4).attr('y', 10)
      .attr('width', colWidth - 8).attr('height', 4)
      .attr('fill', color);

    headerG.append('text')
      .attr('x', cx).attr('y', 32)
      .attr('text-anchor', 'middle')
      .text(phase.step + '. ' + phase.label);

    headerG.append('text')
      .attr('x', cx).attr('y', 48)
      .attr('text-anchor', 'middle')
      .attr('font-size', '9px').attr('fill', color).attr('opacity', 0.7)
      .text(phase.phase);

    headerG.style('cursor', 'pointer').on('click', function(event) {
      event.stopPropagation();
      showSprintDetail(phase);
    });

    // Vertical grid line
    sg.append('line')
      .attr('class', 'sequence-grid-line')
      .attr('x1', margin.left + ci * colWidth).attr('y1', margin.top - 10)
      .attr('x2', margin.left + ci * colWidth).attr('y2', totalHeight);
  });

  // Row labels and cells
  rows.forEach(function(row, ri) {
    var ry = margin.top + ri * rowHeight;

    if (row.type === 'group-label') {
      sg.append('text')
        .attr('class', 'sequence-group-label')
        .attr('x', 10).attr('y', ry + 15)
        .text(row.label);

      sg.append('line')
        .attr('class', 'sequence-grid-line')
        .attr('x1', 0).attr('y1', ry + 2)
        .attr('x2', totalWidth).attr('y2', ry + 2);
      return;
    }

    var labelText = sg.append('text')
      .attr('class', 'sequence-row-label')
      .attr('x', 20).attr('y', ry + 15)
      .text(row.label.length > 22 ? row.label.substring(0, 20) + '...' : row.label);

    labelText.on('click', function(event) {
      event.stopPropagation();
      if (nodeById[row.id]) {
        changeViewMode('force');
        setTimeout(function() { navigateTo(row.id); }, 100);
      }
    });

    labelText.append('title').text(row.label);

    var color = typeColors[row.entityType] || '#8b949e';
    phases.forEach(function(phase, ci) {
      var entities = getPhaseEntities(phase.id, depth);
      var list = entities[row.entityType] || [];
      var participates = list.indexOf(row.id) !== -1;
      if (!participates) return;

      var cx = margin.left + ci * colWidth + colWidth / 2;
      var cell = sg.append('circle')
        .attr('class', 'sequence-cell')
        .attr('cx', cx).attr('cy', ry + 11)
        .attr('r', 5)
        .attr('fill', color).attr('opacity', 0.8);

      cell.on('click', function(event) {
        event.stopPropagation();
        showSprintDetail(phase);
      });

      cell.append('title').text(row.label + ' \u2192 ' + phase.label);
    });
  });

  // Artifact flow arrows (depth 2+)
  if (depth >= 2) {
    for (var i = 0; i < phases.length - 1; i++) {
      var fromPhase = phases[i];
      var toPhase = phases[i + 1];
      var trace = WORKFLOW_TRACE[fromPhase.id];
      if (!trace || !trace.artifactOut) continue;

      var x1 = margin.left + i * colWidth + colWidth / 2 + 20;
      var x2 = margin.left + (i + 1) * colWidth + colWidth / 2 - 20;
      var arrowY = 64;
      var midX = (x1 + x2) / 2;

      sg.append('path')
        .attr('class', 'sequence-artifact-arrow')
        .attr('d', 'M' + x1 + ',' + arrowY + ' Q' + midX + ',' + (arrowY - 12) + ' ' + x2 + ',' + arrowY)
        .attr('marker-end', 'url(#seq-artifact-arrow)');

      sg.append('text')
        .attr('class', 'sequence-artifact-label')
        .attr('x', midX).attr('y', arrowY - 14)
        .attr('text-anchor', 'middle')
        .text(trace.artifactOut);
    }
  }

  // Depth 3: hook badges
  if (depth >= 3) {
    phases.forEach(function(phase, ci) {
      var trace = WORKFLOW_TRACE[phase.id];
      if (!trace || trace.hooks.length === 0) return;
      var cx = margin.left + ci * colWidth + colWidth / 2;
      sg.append('text')
        .attr('class', 'sequence-hook-badge')
        .attr('x', cx).attr('y', margin.top - 4)
        .attr('text-anchor', 'middle')
        .text(trace.hooks.join(', '));
    });
  }
}

// ═══════════════════════════════════════════════════════
// SANKEY FLOW VIEW
// ═══════════════════════════════════════════════════════

function renderSankeyView() {
  var depth = WORKFLOW_DEPTH;
  var phases = SPRINT_PHASES.filter(function(p) { return activePhases.has(p.id); });
  if (phases.length === 0) return;

  var margin = { top: 80, left: 40, right: 40, bottom: 40 };
  var minColWidth = 130;
  var colWidth = Math.max(minColWidth, (width - margin.left - margin.right) / phases.length);
  var totalWidth = margin.left + phases.length * colWidth + margin.right;
  var totalHeight = Math.max(height, 600);
  var availHeight = totalHeight - margin.top - margin.bottom;
  var bandPadding = 3;

  // Create fresh SVG in scroll container
  var skSvg = d3.select(workflowContainer).append('svg')
    .attr('width', totalWidth).attr('height', totalHeight);
  var skg = skSvg.append('g');

  // Background
  skg.append('rect')
    .attr('width', totalWidth).attr('height', totalHeight)
    .attr('fill', '#0d1117');

  // Compute entity weights per phase
  var phaseData = phases.map(function(phase) {
    var entities = getPhaseEntities(phase.id, depth);
    var bands = [];
    var typeOrder = ['plugins', 'skills', 'agents', 'mcp', 'hooks'];
    var typeColors = { plugins: '#4A90D9', skills: '#50C878', agents: '#FF8C42', mcp: '#9B59B6', hooks: '#E74C3C' };

    typeOrder.forEach(function(type) {
      entities[type].forEach(function(id) {
        var weight = 1;
        if (depth >= 2 && type === 'plugins' && PHASE_SKILLS[phase.id]) {
          var sk = PHASE_SKILLS[phase.id];
          weight = 1 + sk.skills.length + sk.agents.length + sk.mcp.length;
        }
        var label = id;
        var n = nodeById[id];
        if (n) label = n.label;
        bands.push({ id: id, label: label, type: type, weight: weight, color: typeColors[type] || '#8b949e' });
      });
    });
    return { phase: phase, bands: bands };
  });

  // Normalize: compute y positions for bands in each column
  phaseData.forEach(function(pd, ci) {
    var totalWeight = 0;
    pd.bands.forEach(function(b) { totalWeight += b.weight; });
    if (totalWeight === 0) totalWeight = 1;

    var yScale = (availHeight - pd.bands.length * bandPadding) / totalWeight;
    var cy = margin.top;
    pd.bands.forEach(function(b) {
      b.y = cy;
      b.h = Math.max(4, b.weight * yScale);
      b.x = margin.left + ci * colWidth + 10;
      b.w = colWidth - 20;
      cy += b.h + bandPadding;
    });
  });

  // Draw column headers
  phases.forEach(function(phase, ci) {
    var cx = margin.left + ci * colWidth + colWidth / 2;
    var color = PHASE_COLORS[phase.phase] || '#8b949e';
    var headerG = skg.append('g').attr('class', 'sankey-column-header');

    headerG.append('rect')
      .attr('x', cx - colWidth / 2 + 4).attr('y', 10)
      .attr('width', colWidth - 8).attr('height', 50)
      .attr('fill', color + '18').attr('stroke', color).attr('stroke-width', 1);

    headerG.append('rect')
      .attr('x', cx - colWidth / 2 + 4).attr('y', 10)
      .attr('width', colWidth - 8).attr('height', 4)
      .attr('fill', color);

    headerG.append('text')
      .attr('x', cx).attr('y', 32)
      .attr('text-anchor', 'middle')
      .text(phase.step + '. ' + phase.label);

    headerG.append('text')
      .attr('x', cx).attr('y', 48)
      .attr('text-anchor', 'middle')
      .attr('font-size', '9px').attr('fill', color).attr('opacity', 0.7)
      .text(phase.phase);

    headerG.style('cursor', 'pointer').on('click', function(event) {
      event.stopPropagation();
      showSprintDetail(phase);
    });
  });

  // Draw bands
  phaseData.forEach(function(pd) {
    pd.bands.forEach(function(b) {
      var bandG = skg.append('g').attr('class', 'sankey-band');

      bandG.append('rect')
        .attr('x', b.x).attr('y', b.y)
        .attr('width', b.w).attr('height', b.h)
        .attr('fill', b.color).attr('fill-opacity', 0.7)
        .attr('rx', 2);

      if (b.h >= 12) {
        bandG.append('text')
          .attr('class', 'sankey-entity-label')
          .attr('x', b.x + 6).attr('y', b.y + b.h / 2 + 3)
          .text(b.label.length > 18 ? b.label.substring(0, 16) + '..' : b.label);
      }

      bandG.append('title').text(b.label + ' (' + b.type + ')');

      bandG.on('click', function(event) {
        event.stopPropagation();
        if (nodeById[b.id]) {
          changeViewMode('force');
          setTimeout(function() { navigateTo(b.id); }, 100);
        }
      });

      // Hover: highlight all bands with same ID
      bandG.on('mouseenter', function() {
        skg.selectAll('.sankey-band rect').attr('fill-opacity', function() {
          var rect = d3.select(this.parentNode);
          return rect.select('title').text().indexOf(b.label) === 0 ? 0.9 : 0.3;
        });
        skg.selectAll('.sankey-flow').attr('fill-opacity', function() {
          return d3.select(this).attr('data-id') === b.id ? 0.35 : 0.05;
        });
      });
      bandG.on('mouseleave', function() {
        skg.selectAll('.sankey-band rect').attr('fill-opacity', 0.7);
        skg.selectAll('.sankey-flow').attr('fill-opacity', 0.15);
      });
    });
  });

  // Draw flow paths between adjacent columns
  for (var ci = 0; ci < phaseData.length - 1; ci++) {
    var fromCol = phaseData[ci];
    var toCol = phaseData[ci + 1];

    fromCol.bands.forEach(function(fromBand) {
      var toBand = null;
      toCol.bands.forEach(function(b) { if (b.id === fromBand.id) toBand = b; });
      if (!toBand) return;

      var x0 = fromBand.x + fromBand.w;
      var x1 = toBand.x;
      var y0top = fromBand.y;
      var y0bot = fromBand.y + fromBand.h;
      var y1top = toBand.y;
      var y1bot = toBand.y + toBand.h;
      var mx = (x0 + x1) / 2;

      var pathD = 'M' + x0 + ',' + y0top +
        ' C' + mx + ',' + y0top + ' ' + mx + ',' + y1top + ' ' + x1 + ',' + y1top +
        ' L' + x1 + ',' + y1bot +
        ' C' + mx + ',' + y1bot + ' ' + mx + ',' + y0bot + ' ' + x0 + ',' + y0bot +
        ' Z';

      skg.append('path')
        .attr('class', 'sankey-flow')
        .attr('d', pathD)
        .attr('fill', fromBand.color)
        .attr('fill-opacity', 0.15)
        .attr('data-id', fromBand.id);
    });
  }
}

// ═══════════════════════════════════════════════════════
// STATE MACHINE VIEW
// ═══════════════════════════════════════════════════════

var smActivePhase = null; // currently expanded phase in state machine view

function renderStateMachineView() {
  var depth = WORKFLOW_DEPTH;
  var phases = SPRINT_PHASES.filter(function(p) { return activePhases.has(p.id); });
  console.log('[SM] phases:', phases.length, 'depth:', depth, 'w:', width, 'h:', height);
  if (phases.length === 0) return;

  smActivePhase = null;

  // Background
  stateMachineGroup.append('rect')
    .attr('width', width).attr('height', height)
    .attr('fill', '#161b22');

  // Elliptical layout — larger radius than force graph
  var cx = width / 2;
  var cy = height / 2;
  var rx = Math.min(width * 0.38, 500);
  var ry = Math.min(height * 0.35, 350);
  var nodeW = 200, nodeH = 80;

  // Compute positions for active phases
  var phasePos = {};
  var n = phases.length;
  phases.forEach(function(phase, i) {
    var angle = -Math.PI / 2 + (i / n) * 2 * Math.PI;
    phasePos[phase.id] = {
      x: cx + rx * Math.cos(angle),
      y: cy + ry * Math.sin(angle),
      angle: angle
    };
  });

  // Draw transition arrows between consecutive phases
  for (var i = 0; i < phases.length - 1; i++) {
    var from = phasePos[phases[i].id];
    var to = phasePos[phases[i + 1].id];
    var dx = to.x - from.x;
    var dy = to.y - from.y;
    var dist = Math.sqrt(dx * dx + dy * dy) || 1;
    var nx = dx / dist, ny = dy / dist;

    var sx = from.x + nx * (nodeW / 2 + 8);
    var sy = from.y + ny * (nodeH / 2 + 8);
    var ex = to.x - nx * (nodeW / 2 + 8);
    var ey = to.y - ny * (nodeH / 2 + 8);

    stateMachineGroup.append('line')
      .attr('class', 'sm-transition sm-transition-animated')
      .attr('x1', sx).attr('y1', sy)
      .attr('x2', ex).attr('y2', ey)
      .attr('stroke', '#58a6ff').attr('stroke-width', 2.5)
      .attr('marker-end', 'url(#sprint-arrow)');

    // Gate diamond
    if (phases[i + 1].gate) {
      var gateColor = phases[i + 1].gate.type === 'hard' ? '#E74C3C' : '#F39C12';
      var gx = (sx + ex) / 2;
      var gy = (sy + ey) / 2;
      var ds = 10;
      var gateG = stateMachineGroup.append('g').attr('class', 'sm-gate');
      gateG.append('path')
        .attr('d', 'M' + gx + ',' + (gy - ds) +
          ' L' + (gx + ds) + ',' + gy +
          ' L' + gx + ',' + (gy + ds) +
          ' L' + (gx - ds) + ',' + gy + ' Z')
        .attr('fill', gateColor).attr('stroke', '#0d1117').attr('stroke-width', 1);
      gateG.append('text')
        .attr('x', gx).attr('y', gy - ds - 6)
        .attr('text-anchor', 'middle')
        .attr('fill', gateColor).attr('font-size', '8px')
        .text(phases[i + 1].gate.label);
    }
  }

  console.log('[SM] drew', phases.length - 1, 'transitions');

  // Skip arc: Brainstorm → Write Plan
  var skipFrom = phasePos['brainstorm'];
  var skipTo = phasePos['write-plan'];
  if (skipFrom && skipTo) {
    var midX = (skipFrom.x + skipTo.x) / 2 + (cx - (skipFrom.x + skipTo.x) / 2) * 0.5;
    var midY = (skipFrom.y + skipTo.y) / 2 + (cy - (skipFrom.y + skipTo.y) / 2) * 0.5;
    stateMachineGroup.append('path')
      .attr('class', 'sm-skip-arc')
      .attr('d', 'M' + skipFrom.x + ',' + skipFrom.y +
        ' Q' + midX + ',' + midY + ' ' + skipTo.x + ',' + skipTo.y)
      .attr('stroke', '#F39C12').attr('stroke-width', 2).attr('fill', 'none');

    stateMachineGroup.append('text')
      .attr('x', midX).attr('y', midY - 10)
      .attr('text-anchor', 'middle')
      .attr('fill', '#F39C12').attr('font-size', '9px')
      .text('skip (trivial)');
  }

  // Draw phase nodes
  phases.forEach(function(phase) {
    var pos = phasePos[phase.id];
    var color = PHASE_COLORS[phase.phase] || '#8b949e';

    var gNode = stateMachineGroup.append('g')
      .attr('class', 'sm-phase-node')
      .attr('data-phase', phase.id)
      .attr('transform', 'translate(' + (pos.x - nodeW / 2) + ',' + (pos.y - nodeH / 2) + ')');

    // Rounded rect
    gNode.append('rect')
      .attr('width', nodeW).attr('height', nodeH)
      .attr('rx', 12).attr('ry', 12)
      .attr('fill', '#161b22')
      .attr('stroke', color).attr('stroke-width', 2.5);

    // Step number
    gNode.append('circle')
      .attr('cx', 24).attr('cy', 28).attr('r', 14)
      .attr('fill', color).attr('opacity', 0.2);
    gNode.append('text')
      .attr('x', 24).attr('y', 33)
      .attr('text-anchor', 'middle')
      .attr('fill', color).attr('font-size', '14px').attr('font-weight', '700')
      .text(phase.step);

    // Label
    gNode.append('text')
      .attr('x', 46).attr('y', 33)
      .attr('fill', '#f0f6fc').attr('font-size', '14px').attr('font-weight', '600')
      .text(phase.label);

    // Phase + artifact
    gNode.append('text')
      .attr('x', 14).attr('y', 58)
      .attr('fill', color).attr('font-size', '10px').attr('opacity', 0.7)
      .text(phase.phase);
    gNode.append('text')
      .attr('x', nodeW - 10).attr('y', 58)
      .attr('text-anchor', 'end')
      .attr('fill', '#8b949e').attr('font-size', '9px')
      .text(phase.artifact);

    // Depth-3 hook badges
    if (depth >= 3 && WORKFLOW_TRACE[phase.id]) {
      var hooks = WORKFLOW_TRACE[phase.id].hooks;
      if (hooks.length > 0) {
        gNode.append('text')
          .attr('x', nodeW - 10).attr('y', 72)
          .attr('text-anchor', 'end')
          .attr('fill', '#E74C3C').attr('font-size', '7px')
          .text(hooks.join(', '));
      }
    }

    // Click to drill down
    gNode.style('cursor', 'pointer').on('click', function(event) {
      event.stopPropagation();
      smDrillDown(phase);
    });
  });

  // Click background to close drill-down
  stateMachineGroup.select('rect').on('click', function() {
    smCloseDrillDown();
    closePanel();
  });
}

function smDrillDown(phase) {
  var depth = WORKFLOW_DEPTH;
  var pos = null;

  // Find position from rendered node
  stateMachineGroup.selectAll('.sm-phase-node').each(function() {
    var el = d3.select(this);
    if (el.attr('data-phase') === phase.id) {
      var t = el.attr('transform');
      var match = t.match(/translate\(([^,]+),([^)]+)\)/);
      if (match) {
        pos = { x: parseFloat(match[1]) + 100, y: parseFloat(match[2]) + 40 };
      }
    }
  });
  if (!pos) return;

  // Clear previous drill-down
  stateMachineGroup.selectAll('.sm-entity-satellite, .sm-entity-line').remove();

  // Highlight active phase
  stateMachineGroup.selectAll('.sm-phase-node')
    .classed('sm-active', function() { return d3.select(this).attr('data-phase') === phase.id; });

  // Get entities for this phase at current depth
  var entities = getPhaseEntities(phase.id, depth);
  var allIds = [];
  var typeColors = { plugins: '#4A90D9', skills: '#50C878', agents: '#FF8C42', mcp: '#9B59B6', hooks: '#E74C3C' };
  var typeOrder = ['plugins', 'skills', 'agents', 'mcp', 'hooks'];

  typeOrder.forEach(function(type) {
    entities[type].forEach(function(id) {
      allIds.push({ id: id, type: type, color: typeColors[type] });
    });
  });

  if (allIds.length === 0) {
    showSprintDetail(phase);
    return;
  }

  // Fan out entities radially around the phase
  var fanRadius = 120;
  var angleStep = (2 * Math.PI) / Math.max(allIds.length, 1);
  var startAngle = -Math.PI / 2;

  allIds.forEach(function(item, i) {
    var angle = startAngle + i * angleStep;
    var ex = pos.x + fanRadius * Math.cos(angle);
    var ey = pos.y + fanRadius * Math.sin(angle);
    var label = item.id;
    var n = nodeById[item.id];
    if (n) label = n.label;

    // Connecting line
    stateMachineGroup.append('line')
      .attr('class', 'sm-entity-line')
      .attr('x1', pos.x).attr('y1', pos.y)
      .attr('x2', ex).attr('y2', ey);

    // Entity circle
    var satG = stateMachineGroup.append('g')
      .attr('class', 'sm-entity-satellite')
      .attr('transform', 'translate(' + ex + ',' + ey + ')')
      .attr('opacity', 0)
      .on('click', function(event) {
        event.stopPropagation();
        if (nodeById[item.id]) {
          // Switch to force view and navigate
          changeViewMode('force');
          setTimeout(function() { navigateTo(item.id); }, 100);
        }
      });

    satG.append('circle')
      .attr('r', depth === 1 ? 10 : 7)
      .attr('fill', item.color).attr('opacity', 0.8);

    satG.append('text')
      .attr('dx', depth === 1 ? 14 : 10).attr('dy', 4)
      .attr('fill', '#c9d1d9').attr('font-size', depth === 1 ? '10px' : '8px')
      .text(label.length > 20 ? label.substring(0, 18) + '..' : label);

    satG.append('title').text(label + ' (' + item.type + ')');

    // Animate in
    satG.transition().duration(300).delay(i * 30)
      .attr('opacity', 0.85);
  });

  // Show detail panel
  showSprintDetail(phase);
  smActivePhase = phase.id;
}

function smCloseDrillDown() {
  stateMachineGroup.selectAll('.sm-entity-satellite, .sm-entity-line').remove();
  stateMachineGroup.selectAll('.sm-phase-node').classed('sm-active', false);
  smActivePhase = null;
}

// ═══════════════════════════════════════════════════════
// WORKFLOW VIEW INTEGRATION
// ═══════════════════════════════════════════════════════

// Patch deselectAll to clear workflow highlights
var _origDeselectAll = deselectAll;
deselectAll = function() {
  _origDeselectAll();
  if (currentViewMode === 'statemachine') smCloseDrillDown();
};

// Patch onSearch to highlight in workflow views
var _origOnSearch = onSearch;
onSearch = function(query) {
  if (!sprintActive || currentViewMode === 'force') {
    _origOnSearch(query);
    return;
  }
  searchQuery = query.toLowerCase().trim();
  if (!searchQuery) return;

  var wc = d3.select(workflowContainer);
  if (currentViewMode === 'sequence') {
    wc.selectAll('.sequence-row-label')
      .attr('fill', function() {
        var text = d3.select(this).text().toLowerCase();
        return text.includes(searchQuery) ? '#58a6ff' : '#c9d1d9';
      })
      .attr('font-weight', function() {
        var text = d3.select(this).text().toLowerCase();
        return text.includes(searchQuery) ? '700' : 'normal';
      });
  } else if (currentViewMode === 'sankey') {
    wc.selectAll('.sankey-band rect').attr('fill-opacity', function() {
      var title = d3.select(this.parentNode).select('title').text().toLowerCase();
      return title.includes(searchQuery) ? 0.9 : 0.2;
    });
  }
};
